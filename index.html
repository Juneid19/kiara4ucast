<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEKARINDAH - Neon Mini Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --neon: #64ffda; 
            --neon2: #a78bfa; 
            --neon3: #f9a8d4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #0d1b2a; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        /* UKURAN TETAP 330x450 */
        .player-container {
            position: relative; width: 330px; height: 450px;
            background: linear-gradient(145deg, rgba(15, 20, 30, 0.95), rgba(10, 15, 25, 0.98));
            border-radius: 20px; padding: 20px; border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; flex-direction: column; justify-content: space-between; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* EFEK NEON BRAND */
        .radio-brand { 
            font-family: 'Orbitron', sans-serif; font-size: 1.1rem; color: var(--neon); 
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--neon), 0 0 20px var(--neon);
            animation: brandGlow 3s ease-in-out infinite alternate;
        }
        @keyframes brandGlow {
            from { opacity: 0.8; text-shadow: 0 0 10px var(--neon); }
            to { opacity: 1; text-shadow: 0 0 15px var(--neon), 0 0 25px var(--neon); }
        }

        /* COVER DENGAN DENYUT NEON */
        .cover-section { position: relative; width: 170px; height: 170px; margin: 10px auto; }
        
        .cover-glow {
            position: absolute; top: -8px; left: -8px; right: -8px; bottom: -8px;
            border-radius: 15px;
            background: linear-gradient(45deg, var(--neon), var(--neon2), var(--neon3));
            filter: blur(15px);
            opacity: 0.5;
            animation: pulseGlow 2s ease-in-out infinite alternate;
        }

        .cover-wrapper { 
            width: 100%; height: 100%; border-radius: 12px; overflow: hidden; z-index: 2; position: relative;
            border: 2px solid var(--neon);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        @keyframes pulseGlow {
            0% { transform: scale(0.98); opacity: 0.3; }
            100% { transform: scale(1.05); opacity: 0.6; }
        }

        .cover-image { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.5s; }
        
        /* TEXT INFO */
        .song-title-container { width: 100%; overflow: hidden; white-space: nowrap; margin-top: 5px; height: 25px; }
        .song-title { font-size: 0.9rem; font-weight: 600; color: #fff; display: inline-block; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        .song-artist { font-size: 0.75rem; color: var(--neon2); opacity: 0.8; height: 20px; }
        .scrolling { animation: marquee 10s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* TOMBOL PLAY NEON */
        .play-btn { 
            width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--neon); 
            background: rgba(0,0,0,0.3); color: var(--neon); cursor: pointer; font-size: 1.3rem; margin: 5px auto;
            transition: 0.3s;
            box-shadow: 0 0 10px var(--neon);
        }
        .play-btn:hover { box-shadow: 0 0 20px var(--neon); transform: scale(1.1); }
        .play-btn.playing { animation: btnPulse 2s infinite; }
        
        @keyframes btnPulse {
            0% { box-shadow: 0 0 10px var(--neon); }
            50% { box-shadow: 0 0 25px var(--neon2); }
            100% { box-shadow: 0 0 10px var(--neon); }
        }

        .volume-control { display: flex; align-items: center; gap: 8px; padding: 8px; background: rgba(0,0,0,0.2); border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .volume-slider { flex: 1; height: 3px; -webkit-appearance: none; background: rgba(255,255,255,0.1); border-radius: 2px; }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; background: var(--neon); border-radius: 50%; cursor: pointer; box-shadow: 0 0 5px var(--neon); }
        
        .footer-text { font-size: 0.5rem; color: rgba(255,255,255,0.2); margin-top: 5px; }
    </style>
</head>
<body>
    <div style="display:none"><span class="cc_streaminfo" data-type="song" data-username="kiarafm" id="fcast_api"></span></div>

    <div class="player-container">
        <div>
            <h1 class="radio-brand">MEKARINDAH</h1>
            <p id="status-text" style="font-size:0.55rem; color:var(--neon2); font-family:'Orbitron'; letter-spacing:1px;">READY</p>
        </div>

        <div class="cover-section">
            <div class="cover-glow"></div>
            <div class="cover-wrapper">
                <img src="https://mekarindah.netlify.app/img/default.jpg" id="cover-art" class="cover-image">
            </div>
        </div>

        <div class="song-info">
            <div class="song-title-container">
                <div class="song-title" id="song-title">Loading...</div>
            </div>
            <div class="song-artist" id="song-artist">Please wait</div>
        </div>

        <button class="play-btn" id="play-btn"><i class="fas fa-play" id="play-icon"></i></button>

        <div class="volume-control">
            <i class="fas fa-volume-high" style="color:var(--neon); font-size:0.7rem"></i>
            <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="75">
        </div>
        <p class="footer-text">Mekarindah © 2026</p>
    </div>

    <audio id="audio-player"></audio>
    <script src="https://eu1.fastcast4u.com/system/streaminfo.js"></script>

    <script>
        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const coverArt = document.getElementById('cover-art');
        const songTitle = document.getElementById('song-title');
        const songArtist = document.getElementById('song-artist');
        let isPlaying = false;
        let lastSong = "";

        // RECITER COVERS DATABASE
        const RECITER_COVERS = {
            'mishary': 'https://i.ytimg.com/vi/GLMp_EGGLfk/hq720.jpg?sqp=-oaymwExCK4FEIIDSFryq4qpAyMIARUAAIhCGAHwAQH4AdQGgALgA4oCDAgAEAEYciBWKDgwDw==&rs=AOn4CLAa_DZgLB8D4xcMTFPgxpnQghg_sw',
            'abdul': 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT99qAcwhSDEUMmxHHzjEfna9YVgtg-04A8rDvXbaNtZf-70ZkRxPPl_i5J_he-DnfdtO7EhS0ouUaiu-hq_bE8Ni9U3xKBjsAdFgzAg4w&s=10',
            'adi hidayat': 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQi7cw0cL0cs4aqyXA5sbBMBaCWGmW0D28pzruJKEWXlx9RYeQLuZouy9VlqLk9oWvOxlO7jHAh6QOXhjPyKPQZqz2rez4YV5XOPrgTTQ&s=10',
            'zainuddin': 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSDo4WarU6dxMHRx3BFqisexu4euGqv9Ni9_JZA5jZBwA&s=10',
            'latif': 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQSgeut2z_VzZzl5_B7sbcdxL2FkG3Rd3dOTaS3WCOXEA&s=10',
            'al sudais': 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/Abdulrahman_Al-Sudais.jpg/440px-Abdulrahman_Al-Sudais.jpg',
            'lili': 'https://is1-ssl.mzstatic.com/image/thumb/Music211/v4/63/25/dd/6325ddda-63aa-0d43-ac16-46dd36a0afce/artwork.jpg/592x592bb.webp',
            'shatri': 'https://i.ibb.co/fQ5N204/shatri.jpg',
            'abdul basit': 'https://i.ibb.co/RzM805h/abdulbasit.jpg'
        };

        // Fungsi untuk mencari cover berdasarkan nama reciter
        function getMappedCover(title, artist) {
            const hay = (artist + ' ' + title).toLowerCase();
            for (const key of Object.keys(RECITER_COVERS)) {
                if (hay.includes(key)) return RECITER_COVERS[key];
            }
            const artistTokens = artist.toLowerCase().split(/\s+/);
            for (const t of artistTokens) {
                if (RECITER_COVERS[t]) return RECITER_COVERS[t];
            }
            return null;
        }

        async function fetchCover(songName, artistName) {
            // Cek dulu apakah ada di RECITER_COVERS
            const mappedCover = getMappedCover(songName, artistName);
            if (mappedCover) {
                coverArt.src = mappedCover;
                return;
            }

            try {
                const searchStr = songName.split('-')[1] || songName;
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(searchStr.trim())}&media=music&limit=1`);
                const data = await res.json();
                if (data.results && data.results.length > 0) {
                    coverArt.src = data.results[0].artworkUrl100.replace('100x100', '400x400');
                } else {
                    coverArt.src = "https://mekarindah.netlify.app/img/default.jpg";
                }
            } catch (e) { 
                coverArt.src = "https://mekarindah.netlify.app/img/default.jpg"; 
            }
        }

        function updateUI() {
            const data = document.getElementById('fcast_api').innerText || document.getElementById('fcast_api').textContent;
            if (data && data.trim() !== "" && data !== lastSong && data !== "Loading...") {
                lastSong = data;
                let artist = "Mekarindah";
                let title = data;
                
                if (data.includes(' - ')) {
                    const p = data.split(' - ');
                    artist = p[0].trim();
                    title = p[1].trim();
                }
                
                songArtist.innerText = artist;
                songTitle.innerText = title;
                
                if (songTitle.scrollWidth > songTitle.parentElement.offsetWidth) songTitle.classList.add('scrolling');
                else songTitle.classList.remove('scrolling');
                
                fetchCover(title, artist);
            }
        }

        playBtn.onclick = async () => {
            if (!isPlaying) {
                audio.src = 'https://eu1.fastcast4u.com/proxy/kiarafm?mp=/1';
                await audio.play();
                isPlaying = true;
                playIcon.className = 'fas fa-pause';
                playBtn.classList.add('playing');
                document.getElementById('status-text').innerText = '• LIVE NOW';
            } else {
                audio.pause(); audio.src = '';
                isPlaying = false;
                playIcon.className = 'fas fa-play';
                playBtn.classList.remove('playing');
                document.getElementById('status-text').innerText = 'PAUSED';
            }
        };

        document.getElementById('volume-slider').oninput = (e) => { audio.volume = e.target.value / 100; };
        setInterval(updateUI, 3000);
    </script>
</body>
</html>
