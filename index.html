<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIARA 4U - Radio Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --neon-color: #64ffda;
            --neon-color2: #a78bfa;
            --neon-color3: #f9a8d4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 50%, #0d1b2a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            transition: background 2s ease;
            overflow-x: hidden;
        }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .player-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 380px;
            background: linear-gradient(145deg, rgba(15, 20, 30, 0.95), rgba(10, 15, 25, 0.98));
            border-radius: 24px;
            padding: 25px;
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.05),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
        }

        .player-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .radio-brand {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--neon-color);
            letter-spacing: 4px;
            text-shadow: 
                0 0 10px var(--neon-color),
                0 0 20px var(--neon-color),
                0 0 40px var(--neon-color);
            animation: brandGlow 3s ease-in-out infinite alternate;
            transition: color 2s ease, text-shadow 2s ease;
        }

        @keyframes brandGlow {
            from { filter: brightness(1); text-shadow: 0 0 10px var(--neon-color), 0 0 20px var(--neon-color); }
            to { filter: brightness(1.2); text-shadow: 0 0 15px var(--neon-color), 0 0 30px var(--neon-color), 0 0 45px var(--neon-color); }
        }

        .radio-tagline {
            font-size: 0.75rem;
            color: var(--neon-color2);
            letter-spacing: 3px;
            margin-top: 5px;
            opacity: 0.8;
            text-transform: uppercase;
            transition: color 2s ease;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #555;
        }

        .status-dot.live {
            background: #6ee7b7;
            box-shadow: 0 0 10px #6ee7b7, 0 0 20px #6ee7b7;
            animation: statusPulse 1.5s ease infinite;
        }

        .status-dot.connecting {
            background: #fbbf24;
            animation: blink 1s ease infinite;
        }

        .status-dot.error {
            background: #f87171;
        }

        @keyframes statusPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .status-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Cover Section */
        .cover-section {
            position: relative;
            width: 100%;
            max-width: 280px;
            margin: 20px auto;
        }

        .cover-glow {
            position: absolute;
            top: -15px;
            left: -15px;
            right: -15px;
            bottom: -15px;
            border-radius: 20px;
            background: conic-gradient(
                from 0deg,
                var(--neon-color),
                var(--neon-color2),
                var(--neon-color3),
                var(--neon-color)
            );
            filter: blur(25px);
            opacity: 0.5;
            animation: glowRotate 8s linear infinite, glowPulse 2s ease-in-out infinite;
            transition: background 2s ease;
        }

        @keyframes glowRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.7; }
        }

        .cover-neon-border {
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border-radius: 18px;
            background: linear-gradient(
                45deg,
                var(--neon-color),
                var(--neon-color2),
                var(--neon-color3),
                var(--neon-color)
            );
            background-size: 300% 300%;
            animation: borderFlow 4s ease infinite, borderPulse 2s ease-in-out infinite;
            z-index: 1;
            transition: background 2s ease;
        }

        @keyframes borderFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes borderPulse {
            0%, 100% { 
                box-shadow: 
                    0 0 15px var(--neon-color),
                    0 0 30px var(--neon-color),
                    inset 0 0 15px rgba(255, 255, 255, 0.1);
            }
            50% { 
                box-shadow: 
                    0 0 25px var(--neon-color2),
                    0 0 50px var(--neon-color2),
                    0 0 75px var(--neon-color3),
                    inset 0 0 20px rgba(255, 255, 255, 0.15);
            }
        }

        .cover-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            border-radius: 14px;
            overflow: hidden;
            z-index: 2;
            background: #1a1a2e;
        }

        .cover-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease, opacity 0.5s ease;
        }

        .cover-image:hover {
            transform: scale(1.05);
        }

        .cover-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                180deg,
                transparent 0%,
                transparent 50%,
                rgba(0, 0, 0, 0.7) 100%
            );
            pointer-events: none;
        }

        /* Cover Source Badge */
        .cover-source {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: var(--neon-color);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.45rem;
            padding: 3px 8px;
            border-radius: 10px;
            letter-spacing: 1px;
            z-index: 3;
            opacity: 0;
            transition: opacity 0.3s ease, color 2s ease;
        }

        .cover-wrapper:hover .cover-source {
            opacity: 1;
        }

        .cover-visualizer {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 30px;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 3;
        }

        .cover-visualizer.active {
            opacity: 1;
        }

        .viz-bar {
            width: 4px;
            background: var(--neon-color);
            border-radius: 2px;
            height: 5px;
            box-shadow: 0 0 8px var(--neon-color);
            transition: background 2s ease, box-shadow 2s ease;
        }

        .viz-bar.active {
            animation-duration: 0.3s;
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
        }

        .viz-bar:nth-child(1).active { animation-name: viz1; }
        .viz-bar:nth-child(2).active { animation-name: viz2; }
        .viz-bar:nth-child(3).active { animation-name: viz3; }
        .viz-bar:nth-child(4).active { animation-name: viz4; }
        .viz-bar:nth-child(5).active { animation-name: viz5; }

        @keyframes viz1 { 0%, 100% { height: 8px; } 50% { height: 25px; } }
        @keyframes viz2 { 0%, 100% { height: 15px; } 50% { height: 20px; } }
        @keyframes viz3 { 0%, 100% { height: 5px; } 50% { height: 30px; } }
        @keyframes viz4 { 0%, 100% { height: 12px; } 50% { height: 22px; } }
        @keyframes viz5 { 0%, 100% { height: 10px; } 50% { height: 28px; } }

        .song-info {
            text-align: center;
            margin: 20px 0;
        }

        .now-playing-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.6rem;
            color: var(--neon-color);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 8px;
            opacity: 0.6;
            transition: color 2s ease;
        }

        .song-title-container {
            width: 100%;
            overflow: hidden;
            padding: 5px 0;
            mask-image: linear-gradient(90deg, transparent, black 10%, black 90%, transparent);
            -webkit-mask-image: linear-gradient(90deg, transparent, black 10%, black 90%, transparent);
        }

        .song-title {
            font-family: 'Poppins', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            display: inline-block;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .song-title.scrolling {
            animation: marquee 12s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .song-artist {
            font-size: 0.9rem;
            color: var(--neon-color2);
            margin-top: 5px;
            opacity: 0.8;
            transition: color 2s ease;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
        }

        .control-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.4);
            font-size: 1.3rem;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            color: var(--neon-color);
            transform: scale(1.15);
        }

        .play-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(145deg, rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.2));
            border: 2px solid var(--neon-color);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease, border-color 2s ease;
            box-shadow: 
                0 0 20px rgba(100, 255, 218, 0.2),
                inset 0 0 20px rgba(0, 0, 0, 0.3);
        }

        .play-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                transparent,
                var(--neon-color),
                transparent 30%
            );
            animation: btnSpin 3s linear infinite;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        @keyframes btnSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .play-btn:hover::before {
            opacity: 0.3;
        }

        .play-btn:hover {
            transform: scale(1.08);
            box-shadow: 
                0 0 30px rgba(100, 255, 218, 0.4),
                0 0 60px rgba(100, 255, 218, 0.2),
                inset 0 0 25px rgba(0, 0, 0, 0.3);
        }

        .play-btn i {
            font-size: 1.8rem;
            color: var(--neon-color);
            z-index: 1;
            margin-left: 4px;
            transition: all 0.3s ease, color 2s ease;
        }

        .play-btn.playing i {
            margin-left: 0;
        }

        .play-btn.playing {
            animation: playingGlow 2s ease-in-out infinite;
        }

        @keyframes playingGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(100, 255, 218, 0.3), inset 0 0 20px rgba(0, 0, 0, 0.3); }
            50% { box-shadow: 0 0 35px rgba(167, 139, 250, 0.5), 0 0 60px rgba(100, 255, 218, 0.3), inset 0 0 25px rgba(0, 0, 0, 0.3); }
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .volume-icon {
            color: var(--neon-color);
            font-size: 1rem;
            cursor: pointer;
            opacity: 0.8;
            transition: all 0.3s ease, color 2s ease;
        }

        .volume-icon:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .volume-slider {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--neon-color);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--neon-color);
        }

        .volume-slider::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: var(--neon-color);
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        .volume-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            color: var(--neon-color);
            min-width: 38px;
            text-align: right;
            opacity: 0.7;
            transition: color 2s ease;
        }

        .player-footer {
            text-align: center;
            margin-top: 15px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
        }

        .footer-text {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 1px;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 25, 0.98);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 24px;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .loading-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--neon-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 15px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            color: var(--neon-color);
            letter-spacing: 3px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(10, 15, 25, 0.95);
            color: rgba(255, 255, 255, 0.9);
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 0.85rem;
            z-index: 1000;
            border: 1px solid var(--neon-color);
            box-shadow: 0 0 20px rgba(100, 255, 218, 0.2);
            max-width: 90%;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.error {
            border-color: #f87171;
        }

        #api-container {
            display: none;
        }

        @media (max-width: 400px) {
            .player-container { padding: 20px; border-radius: 20px; }
            .radio-brand { font-size: 1.5rem; }
            .cover-section { max-width: 240px; }
            .play-btn { width: 65px; height: 65px; }
            .play-btn i { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>

    <!-- Hidden API Container -->
    <div id="api-container">
        <span class="cc_streaminfo" data-type="song" data-username="kiarafm" id="fcast"></span>
    </div>

    <div class="player-container">
        <div class="loading-overlay" id="loading-overlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">CONNECTING...</div>
        </div>

        <div class="player-header">
            <h1 class="radio-brand">MEKARINDAH</h1>
            <p class="radio-tagline">Your Murottal Station</p>
            <div class="status-bar">
                <div class="status-dot" id="status-dot"></div>
                <span class="status-text" id="status-text">Ready to Play</span>
            </div>
        </div>

        <div class="cover-section">
            <div class="cover-glow"></div>
            <div class="cover-neon-border"></div>
            <div class="cover-wrapper">
                <img src="https://cdn.theradiohub.com/logos/157.jpg" alt="KIARA 4U" class="cover-image" id="cover-art">
                <div class="cover-overlay"></div>
                <span class="cover-source" id="cover-source"></span>
                <div class="cover-visualizer" id="visualizer">
                    <div class="viz-bar"></div>
                    <div class="viz-bar"></div>
                    <div class="viz-bar"></div>
                    <div class="viz-bar"></div>
                    <div class="viz-bar"></div>
                </div>
            </div>
        </div>

        <div class="song-info">
            <div class="now-playing-label">Now Playing</div>
            <div class="song-title-container">
                <div class="song-title" id="song-title">MEKARINDAH</div>
            </div>
            <div class="song-artist" id="song-artist">Click Play to Start</div>
        </div>

        <div class="controls">
            <button class="control-btn" id="color-btn" title="Change Color">
                <i class="fas fa-palette"></i>
            </button>
            <button class="play-btn" id="play-btn" title="Play/Pause">
                <i class="fas fa-play" id="play-icon"></i>
            </button>
            <button class="control-btn" id="refresh-btn" title="Refresh">
                <i class="fas fa-rotate"></i>
            </button>
        </div>

        <div class="volume-control">
            <i class="fas fa-volume-high volume-icon" id="volume-icon"></i>
            <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="75">
            <span class="volume-value" id="volume-value">75%</span>
        </div>

        <div class="player-footer">
            <p class="footer-text">Mekarindah © 2026</p>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <audio id="audio-player" preload="none"></audio>

    <!-- FastCast4u API Script -->
    <script src="https://eu1.fastcast4u.com/system/streaminfo.js"></script>

    <script>
        // ==================== CONFIG ====================
        const CONFIG = {
            radioName: 'KIARA 4U',
            streamUrl: 'https://eu1.fastcast4u.com/proxy/kiarafm?mp=/1',
            defaultCover: 'https://cdn.theradiohub.com/logos/157.jpg',
            updateInterval: 5000,
            colorChangeInterval: 15000,
            corsProxies: [
                'https://api.allorigins.win/raw?url=',
                'https://corsproxy.io/?'
            ]
        };

        // ==================== COLOR PRESETS ====================
        const backgrounds = [
            'linear-gradient(135deg, #0d1b2a 0%, #1b263b 50%, #0d1b2a 100%)',
            'linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #1a1a2e 100%)',
            'linear-gradient(135deg, #0a192f 0%, #112240 50%, #0a192f 100%)',
            'linear-gradient(135deg, #141e30 0%, #243b55 50%, #141e30 100%)',
            'linear-gradient(135deg, #1c1c1c 0%, #2d2d2d 50%, #1c1c1c 100%)',
            'linear-gradient(135deg, #1a0f14 0%, #2d1f2d 50%, #1a0f14 100%)',
            'linear-gradient(135deg, #0a1a14 0%, #1a2f25 50%, #0a1a14 100%)',
            'linear-gradient(135deg, #0f0c29 0%, #1a1a3e 50%, #0f0c29 100%)'
        ];

        const neonColors  = ['#64ffda','#a78bfa','#67e8f9','#7dd3fc','#f9a8d4','#c4b5fd','#6ee7b7','#93c5fd'];
        const neonColors2 = ['#a78bfa','#64ffda','#f9a8d4','#6ee7b7','#67e8f9','#93c5fd','#c4b5fd','#7dd3fc'];
        const neonColors3 = ['#f9a8d4','#6ee7b7','#a78bfa','#67e8f9','#c4b5fd','#7dd3fc','#64ffda','#93c5fd'];

        // ==================== DOM ====================
        const $ = id => document.getElementById(id);
        const audio        = $('audio-player');
        const playBtn      = $('play-btn');
        const playIcon     = $('play-icon');
        const coverArt     = $('cover-art');
        const coverSource  = $('cover-source');
        const songTitle    = $('song-title');
        const songArtist   = $('song-artist');
        const volumeSlider = $('volume-slider');
        const volumeIcon   = $('volume-icon');
        const volumeValue  = $('volume-value');
        const loadingOverlay = $('loading-overlay');
        const statusDot    = $('status-dot');
        const statusText   = $('status-text');
        const toast        = $('toast');
        const refreshBtn   = $('refresh-btn');
        const colorBtn     = $('color-btn');
        const visualizer   = $('visualizer');
        const fcastElement = $('fcast');

        // ==================== STATE ====================
        let state = {
            isPlaying: false,
            currentSong: '',
            currentCover: '',
            volume: 0.75,
            isMuted: false,
            prevVolume: 0.75,
            metadataInterval: null,
            colorInterval: null,
            colorIndex: 0,
            particles: []
        };

        // ==================== BACKGROUND ====================
        function changeBG(seed) {
            const x = Math.abs(String(seed).split('').reduce((a, c) => a + c.charCodeAt(0), 0));
            const idx = x % backgrounds.length;
            applyColors(idx);
        }

        function cycleBG() {
            state.colorIndex = (state.colorIndex + 1) % backgrounds.length;
            applyColors(state.colorIndex);
        }

        function applyColors(idx) {
            document.body.style.background = backgrounds[idx];
            document.documentElement.style.setProperty('--neon-color', neonColors[idx]);
            document.documentElement.style.setProperty('--neon-color2', neonColors2[idx]);
            document.documentElement.style.setProperty('--neon-color3', neonColors3[idx]);
            state.colorIndex = idx;
        }

        function startColorCycle() {
            if (state.colorInterval) clearInterval(state.colorInterval);
            state.colorInterval = setInterval(cycleBG, CONFIG.colorChangeInterval);
        }

        function stopColorCycle() {
            if (state.colorInterval) { clearInterval(state.colorInterval); state.colorInterval = null; }
        }

        // ==================== PARTICLES ====================
        function createParticles() {
            const canvas = $('particles-canvas');
            const ctx = canvas.getContext('2d');

            function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            resize();
            window.addEventListener('resize', resize);

            const count = Math.min(40, Math.floor((canvas.width * canvas.height) / 35000));
            for (let i = 0; i < count; i++) {
                state.particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    speedX: (Math.random() - 0.5) * 0.3,
                    speedY: (Math.random() - 0.5) * 0.3,
                    opacity: Math.random() * 0.3 + 0.1
                });
            }

            function hexToRgb(hex) {
                const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                return r ? { r: parseInt(r[1],16), g: parseInt(r[2],16), b: parseInt(r[3],16) } : { r:100, g:255, b:218 };
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const nc = getComputedStyle(document.documentElement).getPropertyValue('--neon-color').trim() || '#64ffda';
                const rgb = hexToRgb(nc);
                
                state.particles.forEach(p => {
                    p.x += p.speedX; p.y += p.speedY;
                    if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
                    if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${p.opacity})`;
                    ctx.fill();
                });

                for (let i = 0; i < state.particles.length; i++) {
                    for (let j = i + 1; j < state.particles.length; j++) {
                        const dx = state.particles[i].x - state.particles[j].x;
                        const dy = state.particles[i].y - state.particles[j].y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < 100) {
                            ctx.beginPath();
                            ctx.moveTo(state.particles[i].x, state.particles[i].y);
                            ctx.lineTo(state.particles[j].x, state.particles[j].y);
                            ctx.strokeStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${0.06*(1-dist/100)})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(animate);
            }
            animate();
        }

        // ==================== UTILITY ====================
        function showToast(msg, isError = false) {
            toast.textContent = msg;
            toast.className = 'toast show' + (isError ? ' error' : '');
            setTimeout(() => toast.className = 'toast', 3000);
        }

        function setStatus(type, text) {
            statusDot.className = 'status-dot ' + type;
            statusText.textContent = text;
        }

        // ==================== COVER ART SEARCH ====================

        // Clean query untuk pencarian
        function cleanSearchQuery(query) {
            return query
                .replace(/\[.*?\]/g, '')
                .replace(/\(.*?\)/g, '')
                .replace(/feat\..*/i, '')
                .replace(/ft\..*/i, '')
                .replace(/&/g, 'and')
                .replace(/\s+/g, ' ')
                .trim();
        }

        // Test apakah gambar bisa di-load
        function testImage(url) {
            return new Promise(resolve => {
                const img = new Image();
                img.onload = () => resolve(true);
                img.onerror = () => resolve(false);
                img.src = url;
            });
        }

        // 1. Search iTunes
        async function searchITunes(query) {
            try {
                const clean = cleanSearchQuery(query);
                if (clean.length < 3) return null;

                console.log(`🍎 iTunes search: "${clean}"`);
                const url = `https://itunes.apple.com/search?term=${encodeURIComponent(clean)}&media=music&limit=5`;
                const res = await fetch(url);
                const data = await res.json();

                if (data.results && data.results.length > 0) {
                    const artwork = data.results[0].artworkUrl100;
                    if (artwork) {
                        const hd = artwork.replace('100x100', '600x600');
                        console.log(`🍎 iTunes found!`);
                        return hd;
                    }
                }
            } catch (e) {
                console.log(`🍎 iTunes error: ${e.message}`);
            }
            return null;
        }

        // 2. Search Deezer (via CORS proxy)
        async function searchDeezer(query) {
            try {
                const clean = cleanSearchQuery(query);
                if (clean.length < 3) return null;

                console.log(`🎵 Deezer search: "${clean}"`);

                for (const proxy of CONFIG.corsProxies) {
                    try {
                        const deezerUrl = `https://api.deezer.com/search?q=${encodeURIComponent(clean)}&limit=5`;
                        const res = await fetch(proxy + encodeURIComponent(deezerUrl));
                        const text = await res.text();
                        const data = JSON.parse(text);

                        if (data.data && data.data.length > 0) {
                            const album = data.data[0].album;
                            if (album) {
                                const cover = album.cover_xl || album.cover_big || album.cover_medium;
                                if (cover) {
                                    console.log(`🎵 Deezer found!`);
                                    return cover;
                                }
                            }
                        }
                    } catch (e) {
                        continue;
                    }
                }
            } catch (e) {
                console.log(`🎵 Deezer error: ${e.message}`);
            }
            return null;
        }

        // 3. Combined search: iTunes → Deezer → Partial → Default
        async function findCoverArt(songInfo) {
            if (!songInfo || songInfo.length < 3) {
                return { url: CONFIG.defaultCover, source: '' };
            }

            // Full query search
            // Step 1: iTunes
            const itunesCover = await searchITunes(songInfo);
            if (itunesCover && await testImage(itunesCover)) {
                return { url: itunesCover, source: 'iTunes' };
            }

            // Step 2: Deezer
            const deezerCover = await searchDeezer(songInfo);
            if (deezerCover && await testImage(deezerCover)) {
                return { url: deezerCover, source: 'Deezer' };
            }

            // Step 3: Partial search (hanya judul atau artis)
            if (songInfo.includes(' - ')) {
                const parts = songInfo.split(' - ');
                
                // Coba hanya judul
                const titleCover = await searchITunes(parts[1] || parts[0]);
                if (titleCover && await testImage(titleCover)) {
                    return { url: titleCover, source: 'iTunes' };
                }

                // Coba hanya artis
                const artistCover = await searchITunes(parts[0]);
                if (artistCover && await testImage(artistCover)) {
                    return { url: artistCover, source: 'iTunes' };
                }

                // Coba Deezer hanya judul
                const titleDeezer = await searchDeezer(parts[1] || parts[0]);
                if (titleDeezer && await testImage(titleDeezer)) {
                    return { url: titleDeezer, source: 'Deezer' };
                }
            }

            // Step 4: Default
            return { url: CONFIG.defaultCover, source: '' };
        }

        // ==================== NOW PLAYING ====================
        async function fetchNowPlaying(forceUpdate = false) {
            // Get song from FastCast4u API
            const songData = (fcastElement.textContent || fcastElement.innerText || '').trim();

            if (!songData || songData === '') return;
            if (songData === state.currentSong && !forceUpdate) return;

            state.currentSong = songData;
            console.log(`🎵 Now Playing: ${songData}`);

            // Parse artist & title
            let artist = CONFIG.radioName;
            let title = songData;

            if (songData.includes(' - ')) {
                const parts = songData.split(' - ');
                artist = parts[0].trim();
                title = parts.slice(1).join(' - ').trim();
            }

            // Update text
            songTitle.textContent = title;
            songArtist.textContent = artist;

            // Check scrolling
            songTitle.classList.remove('scrolling');
            requestAnimationFrame(() => {
                if (songTitle.scrollWidth > songTitle.parentElement.offsetWidth) {
                    songTitle.classList.add('scrolling');
                }
            });

            // Change background based on song
            changeBG(songData);

            // Search cover art
            console.log(`🔍 Searching cover for: "${songData}"`);
            const cover = await findCoverArt(songData);

            // Update cover if changed
            if (cover.url !== state.currentCover) {
                state.currentCover = cover.url;

                // Fade out
                coverArt.style.opacity = '0';

                setTimeout(() => {
                    coverArt.src = cover.url;
                    coverSource.textContent = cover.source;

                    coverArt.onload = () => {
                        coverArt.style.opacity = '1';
                        if (cover.source) {
                            console.log(`✅ Cover loaded from ${cover.source}`);
                        }
                    };

                    coverArt.onerror = () => {
                        console.log(`❌ Cover failed, using default`);
                        coverArt.src = CONFIG.defaultCover;
                        coverSource.textContent = '';
                        coverArt.style.opacity = '1';
                    };
                }, 300);
            }

            setStatus('live', 'Live');
            showToast(`🎵 ${title}`);

            // Media Session
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title, artist,
                    album: CONFIG.radioName,
                    artwork: [{ src: cover.url, sizes: '512x512', type: 'image/jpeg' }]
                });
            }
        }

        // ==================== PLAYBACK ====================
        async function playStream() {
            loadingOverlay.classList.add('active');
            setStatus('connecting', 'Connecting...');

            try {
                audio.src = CONFIG.streamUrl;
                audio.volume = state.volume;
                await audio.play();

                state.isPlaying = true;
                playIcon.className = 'fas fa-pause';
                playBtn.classList.add('playing');

                visualizer.classList.add('active');
                document.querySelectorAll('.viz-bar').forEach(bar => bar.classList.add('active'));

                setStatus('live', 'Live');
                showToast('▶️ Now Playing');

                startColorCycle();

                // Fetch now playing immediately & start interval
                setTimeout(() => fetchNowPlaying(true), 1000);
                state.metadataInterval = setInterval(fetchNowPlaying, CONFIG.updateInterval);

            } catch (e) {
                console.error(e);
                showToast('Failed to play', true);
                setStatus('error', 'Error');
            }

            loadingOverlay.classList.remove('active');
        }

        function pauseStream() {
            audio.pause();
            audio.src = '';

            state.isPlaying = false;
            playIcon.className = 'fas fa-play';
            playBtn.classList.remove('playing');

            visualizer.classList.remove('active');
            document.querySelectorAll('.viz-bar').forEach(bar => bar.classList.remove('active'));

            if (state.metadataInterval) { clearInterval(state.metadataInterval); state.metadataInterval = null; }
            stopColorCycle();

            setStatus('', 'Paused');
            showToast('⏸️ Paused');
        }

        function togglePlay() { state.isPlaying ? pauseStream() : playStream(); }

        // ==================== VOLUME ====================
        function updateVolume(value) {
            state.volume = value / 100;
            audio.volume = state.volume;
            volumeValue.textContent = value + '%';

            const icons = ['fa-volume-xmark','fa-volume-off','fa-volume-low','fa-volume-high'];
            volumeIcon.className = `fas ${icons[value==0?0:value<30?1:value<70?2:3]} volume-icon`;
            state.isMuted = value == 0;

            const nc = getComputedStyle(document.documentElement).getPropertyValue('--neon-color').trim();
            volumeSlider.style.background = `linear-gradient(to right, ${nc} ${value}%, rgba(255,255,255,0.1) ${value}%)`;
        }

        function toggleMute() {
            if (state.isMuted || state.volume === 0) {
                volumeSlider.value = state.prevVolume > 0 ? state.prevVolume * 100 : 75;
                updateVolume(volumeSlider.value);
            } else {
                state.prevVolume = state.volume;
                volumeSlider.value = 0;
                updateVolume(0);
            }
        }

        // ==================== EVENTS ====================
        function initEvents() {
            playBtn.addEventListener('click', togglePlay);
            volumeSlider.addEventListener('input', e => updateVolume(e.target.value));
            volumeIcon.addEventListener('click', toggleMute);

            refreshBtn.addEventListener('click', () => {
                refreshBtn.querySelector('i').classList.add('fa-spin');
                state.currentSong = '';
                state.currentCover = '';
                fetchNowPlaying(true);
                setTimeout(() => refreshBtn.querySelector('i').classList.remove('fa-spin'), 1000);
            });

            colorBtn.addEventListener('click', cycleBG);

            audio.addEventListener('error', () => {
                showToast('Stream error', true);
                setStatus('error', 'Error');
                if (state.isPlaying) setTimeout(playStream, 5000);
            });
            audio.addEventListener('waiting', () => setStatus('connecting', 'Buffering...'));
            audio.addEventListener('playing', () => setStatus('live', 'Live'));

            document.addEventListener('keydown', e => {
                if (e.target.tagName === 'INPUT') return;
                if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
                else if (e.code === 'ArrowUp') { e.preventDefault(); volumeSlider.value = Math.min(100, +volumeSlider.value + 5); updateVolume(volumeSlider.value); }
                else if (e.code === 'ArrowDown') { e.preventDefault(); volumeSlider.value = Math.max(0, +volumeSlider.value - 5); updateVolume(volumeSlider.value); }
                else if (e.code === 'KeyM') toggleMute();
                else if (e.code === 'KeyC') cycleBG();
            });

            coverArt.addEventListener('error', () => {
                coverArt.src = CONFIG.defaultCover;
                coverSource.textContent = '';
            });

            if ('mediaSession' in navigator) {
                navigator.mediaSession.setActionHandler('play', playStream);
                navigator.mediaSession.setActionHandler('pause', pauseStream);
            }
        }

        // ==================== INIT ====================
        function init() {
            console.log('🎵 KIARA 4U Radio Player v2.0');
            console.log('📀 Cover Art: iTunes → Deezer → Default');
            console.log('🎨 Auto Color Change: 15s');
            console.log('⌨️ Press C to change colors');

            createParticles();
            changeBG('KIARA4U');
            updateVolume(75);
            initEvents();
        }

        document.addEventListener('DOMContentLoaded', init);
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && state.isPlaying) fetchNowPlaying();
        });
    </script>
</body>
</html>
